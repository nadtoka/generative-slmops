name: MLOps SLM Fine-Tuning Pipeline

# 1. Trigger only when OpsNotes.md changes in the main branch
on:
  push:
    branches:
      - main
    paths:
      - 'projects/slm-finetuning/OpsNotes.md'

jobs:
  train-and-deploy:
    runs-on: [self-hosted, k12]

    steps:
    # 2. Checkout the repository code
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        clean: false

    # 3. Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Standard safe runner version

    # 4. Cache pip dependencies to speed up future runs
    - name: Cache Pip Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('projects/slm-finetuning/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 5. Install MLOps software stack
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r projects/slm-finetuning/requirements.txt

    # 6. Run Stages sequentially inside the working directory
    - name: Execute MLOps Pipeline
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }} # Injected from GitHub Repository Secrets
      run: |
        cd projects/slm-finetuning
        echo "[Stage 1/3] Parsing OpsNotes and uploading dataset..."
        python3 upload_dataset.py
        echo "[Stage 2/3] Starting LoRA fine-tuning on GitHub Runner..."
        python3 train_lora.py
        echo "[Stage 3/3] Uploading trained LoRA adapter to Hugging Face Hub..."
        python3 upload_adapter.py
