name: MLOps SLM Fine-Tuning Pipeline

# 1. Trigger only when OpsNotes.md changes in the main branch
on:
  push:
    branches:
      - main2
    paths:
      - 'projects/slm-finetuning/llama_ollama_experiment/OpsNotes.md'

jobs:
  train-and-deploy:
    runs-on: [self-hosted, k12]
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
    # 2. Checkout the repository code
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        clean: false

    # 3. Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Standard safe runner version

    # 4. Install MLOps software stack
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r projects/slm-finetuning/requirements.txt

    # 5. Стадія 1: Парсинг маркдауну та оновлення датасету
    - name: Stage 1 - Parse OpsNotes & Upload Dataset
      run: |
        cd projects/slm-finetuning
        python3 upload_dataset.py

    # 6. Стадія 2: Локальне тренування LoRA на Ryzen 7
    - name: Stage 2 - Run LoRA Fine-Tuning on CPU
      run: |
        cd projects/slm-finetuning
        python3 train_lora.py

    # 7. Стадія 3: Автоматичний Quality Gate (якщо впаде тут — деплою не буде)
    - name: Stage 3 - Quality Gate Verification
      run: |
        cd projects/slm-finetuning
        python3 verify_lora.py

    # 8. Стадія 4: Публікація ВАЛІДОВАНОГО адаптера на Hugging Face
    - name: Stage 4 - Deploy Validated Adapter to Hugging Face
      run: |
        cd projects/slm-finetuning
        python3 upload_adapter.py
