name: Test Local AI Runner

on:
  workflow_dispatch:

jobs:
  check-environment:
    runs-on: [self-hosted, k12]

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Check CPU and System Info
        run: |
          echo "=== Інформація про систему ==="
          uname -a
          echo "=== Процесор ==="
          lscpu | grep "Model name"

      - name: Check Docker Availability
        run: |
          echo "=== Перевірка Docker ==="
          docker --version
          docker ps

      - name: Check Ollama Connection
        run: |
          echo "=== Перевірка Ollama API ==="
          curl http://localhost:11434/api/tags

      - name: Run Local RAG Integration Test
        run: |
          echo "=== Running RAG Test ==="
          cd projects/local-rag
          source venv/bin/activate
          python3 query.py "Is military deferment available for this position?"
