name: MLOps Llama Ollama & Space Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'projects/slm-finetuning/llama_ollama_experiment/OpsNotes.md'

jobs:
  llama-train-and-space-deploy:
    runs-on: [self-hosted, k12]
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        clean: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r projects/slm-finetuning/llama_ollama_experiment/requirements.txt

    # СТАДІЯ 1: Парсимо новий великий англійський маніфест за допомогою глобального скрипта
    - name: Stage 1 - Parse Experiment OpsNotes to JSONL
      run: |
        cd projects/slm-finetuning
        python3 upload_dataset.py --input llama_ollama_experiment/OpsNotes.md --output llama_ollama_experiment/dataset.jsonl || python3 upload_dataset.py
        if [ -f dataset.jsonl ]; then cp dataset.jsonl llama_ollama_experiment/dataset.jsonl; fi

    # СТАДІЯ 2: Запускаємо локальний Llama-тренер всередині його ізольованої папки
    - name: Stage 2 - Run Llama LoRA Fine-Tuning
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        python3 train_lora.py

    # СТАДІЯ 3: Компілюємо отриманий LoRA-адаптер в GGUF формат
    - name: Stage 3 - Compile LoRA to GGUF
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        python3 ~/ai-practice/llama.cpp/convert_lora_to_gguf.py ./best_lora_adapter --outfile ./best_lora_adapter.gguf

    # СТАДІЯ 4: Пушимо новий адаптер у хмару
    - name: Stage 4 - Deploy GGUF Adapter to HF Space
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        hf upload nadtoka/llama-3.2-devops-notes ./best_lora_adapter.gguf best_lora_adapter.gguf --repo-type=space
