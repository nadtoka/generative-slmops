name: MLOps Llama Ollama & Space Pipeline

# 1. Тригеримося СУТО при зміні OpsNotes.md всередині нашого підпроєкту
on:
  push:
    branches:
      - main
    paths:
      - 'projects/slm-finetuning/llama_ollama_experiment/OpsNotes.md'

jobs:
  llama-train-and-space-deploy:
    runs-on: [self-hosted, k12]
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
    # 2. Checkout репозиторію
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        clean: false

    # 3. Налаштування Python середовища
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 4. Інсталяція залежностей експерименту
    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r projects/slm-finetuning/llama_ollama_experiment/requirements.txt

    # 5. Стадія 1: Парсинг локальних нотаток у dataset.jsonl (якщо у вас там свій скрипт)
    # Якщо використовується глобальний скрипт, адаптуємо шлях
    - name: Stage 1 - Parse Experiment OpsNotes
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        # Тут запускається скрипт парсингу, якщо він оновлює локальний jsonl
        # python3 upload_dataset.py --local-only

    # 6. Стадія 2: Локальне тренування LoRA для Llama 3.2 на CPU
    - name: Stage 2 - Run Llama LoRA Fine-Tuning
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        python3 train_lora.py

    # 7. Стадія 3: Компіляція отриманого адаптера в GGUF формат
    - name: Stage 3 - Compile LoRA to GGUF
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        python3 ~/ai-practice/llama.cpp/convert_lora_to_gguf.py ./best_lora_adapter --outfile ./best_lora_adapter.gguf

    # 8. Стадія 4: Прямий деплой оновленого GGUF-бінарника в твій Hugging Face Space
    - name: Stage 4 - Deploy GGUF Adapter to HF Space
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        # Заливаємо оновлені ваги через hf-cli. app.py та requirements.txt вже лежать на Space в main, міняємо тільки мізки
        huggingface-cli upload nadtoka/llama-3.2-devops-notes ./best_lora_adapter.gguf best_lora_adapter.gguf --repo-type=space
