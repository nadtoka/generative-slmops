name: MLOps Llama Monolith & Space Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'projects/slm-finetuning/llama_ollama_experiment/**'
      - '.github/workflows/mlops-llama-space.yml'

jobs:
  llama-train-and-space-deploy:
    runs-on: [self-hosted, k12]
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        clean: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r projects/slm-finetuning/llama_ollama_experiment/requirements.txt
        pip install sentencepiece tiktoken

    - name: Stage 0 - Check Cache Layers
      id: cache-check
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        CACHE_DIR="/home/onadtoka/ai-practice/pipeline_cache"
        mkdir -p $CACHE_DIR
        
        CURRENT_HASH=$(cat OpsNotes.md train_lora.py | md5sum | cut -d' ' -f1)
        echo "💡 Current Layers Combined MD5: $CURRENT_HASH"

        if [ -f "$CACHE_DIR/ops_notes.hash" ] && [ "$(cat $CACHE_DIR/ops_notes.hash)" = "$CURRENT_HASH" ] && [ -f "$CACHE_DIR/custom_devops_llama_q4.gguf" ]; then
          echo "🚀 HIT: No changes in OpsNotes.md. Layer cache matched!"
          echo "skip_heavy_steps=true" >> $GITHUB_OUTPUT
          cp $CACHE_DIR/custom_devops_llama_q4.gguf ./
        else
          echo "🔄 MISS: Dataset changed or cache empty. Rebuilding layers..."
          echo "skip_heavy_steps=false" >> $GITHUB_OUTPUT
          echo "$CURRENT_HASH" > $CACHE_DIR/ops_notes.hash
        fi

    - name: Stage 1 - Parse Experiment OpsNotes to JSONL
      if: steps.cache-check.outputs.skip_heavy_steps != 'true'
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        python3 upload_dataset.py

    - name: Stage 2 - Run Llama LoRA Fine-Tuning
      if: steps.cache-check.outputs.skip_heavy_steps != 'true'
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        python3 train_lora.py

    # СТАДІЯ 2.5: Зшиваємо ваги локально на K12
    - name: Stage 2.5 - Merge LoRA Weights into Base Model
      if: steps.cache-check.outputs.skip_heavy_steps != 'true'
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        python3 merge_lora.py

    # СТАДІЯ 3: Конвертуємо отриманий моноліт у базовий неквантований GGUF
    - name: Stage 3 - Convert Monolith to GGUF Format
      if: steps.cache-check.outputs.skip_heavy_steps != 'true'
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        python3 ~/ai-practice/llama.cpp/convert_hf_to_gguf.py ./merged_hf_model --outfile ./unquantized_monolith.gguf

    # СТАДІЯ 3.5: Квантуємо моноліт на К12 до формату Q4_K_M за 10 секунд
    - name: Stage 3.5 - Quantize Monolith to Optimized Q4_K_M
      if: steps.cache-check.outputs.skip_heavy_steps != 'true'
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        ~/ai-practice/llama.cpp/build/bin/llama-quantize ./unquantized_monolith.gguf ./custom_devops_llama_q4.gguf Q4_K_M
        # Дописуємо копіювання в кеш-папку:
        cp ./custom_devops_llama_q4.gguf /home/onadtoka/ai-practice/pipeline_cache/

    # СТАДІЯ 4: Заливаємо ОДИН готовий, стиснутий і розумний файл у Спейс
    - name: Stage 4 - Deploy Quantized Monolith to HF Space
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment
        # 1. Заливаємо 2 ГБ бінарник у безлімітне сховище моделей
        hf upload nadtoka/llama-3.2-devops-notes-model ./custom_devops_llama_q4.gguf custom_devops_llama_q4.gguf
        # 2. Оновлюємо код у Спейсі: беремо локальний space_app.py і заливаємо його туди як app.py!
        hf upload nadtoka/llama-3.2-devops-notes ./space_app.py app.py --type space
    
    # СТАДІЯ 5: Оновлюємо модель у локальному Ollama для домашнього Open WebUI
    - name: Stage 5 - Update Local Ollama Engine
      run: |
        cd projects/slm-finetuning/llama_ollama_experiment

        # Створюємо тимчасовий конфіг, зберігаючи твій системний промпт та тюнінг
        cat << 'EOF' > Modelfile.ollama
        # 1. Беремо наш новий, локально зшитий і квантований моноліт
        FROM ./custom_devops_llama_q4.gguf

        # 2. Твій фірмовий системний контекст Senior DevOps для Open WebUI
        SYSTEM """You are an expert Senior DevOps Engineer, Cloud Architect, and SysAdmin.
        Your primary focus is Kubernetes, Docker, AWS, Linux, Terraform, and CI/CD pipelines.
        Always provide concise, highly technical answers. Use clear terminal commands and code blocks.
        If a user asks about topics outside of IT infrastructure, hardware, or software engineering, gently decline and steer the conversation back to tech."""

        # 3. Тюнінг продуктивності та детермінованості
        PARAMETER num_ctx 4096
        PARAMETER temperature 0.2
        PARAMETER top_p 0.9
        PARAMETER stop <|eot_id|>
        EOF

        # 4. Оновлюємо локальний двигун Ollama через тимчасовий конфіг
        ollama create devops-llama:latest -f Modelfile.ollama

        # Чистимо за собою сміття
        rm Modelfile.ollama
